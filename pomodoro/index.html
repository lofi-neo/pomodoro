<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pomodoro</title>
    <meta name="description" content="A beautiful and modern Pomodoro timer to boost your productivity.">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <div class="glass-panel">
            <div class="mode-selector">
                <button id="mode-work" class="mode-btn active">Pomodoro</button>
                <button id="mode-rest" class="mode-btn">Short Break</button>
            </div>

            <div class="timer-display">
                <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>

            <div class="timer-control">
                <input type="range" id="time-slider" class="time-slider" min="0" max="1500" value="1500"
                    title="Adjust remaining time">
            </div>

            <div class="controls">
                <button id="start-btn" class="btn primary">Start</button>
                <button id="reset-btn" class="btn secondary">Reset</button>
            </div>

            <div class="branding">
                <img src="logo.png" alt="Prairie Spirit Logo">
                <span>Prairie Spirit School Div</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
